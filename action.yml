name: 'Prism Scanner'
description: 'Security scanner for AI Agent skills, plugins, and MCP servers. 39+ detection rules with AST taint tracking and A-F grading.'
author: 'Prism Lab'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  path:
    description: 'Path to scan (default: current directory)'
    required: false
    default: '.'
  format:
    description: 'Output format: cli, json, sarif, html'
    required: false
    default: 'sarif'
  output-file:
    description: 'Output file path (default: prism-results.sarif for sarif format)'
    required: false
    default: 'prism-results.sarif'
  fail-on:
    description: 'Fail if findings at this severity or above: critical, high, medium'
    required: false
    default: ''
  platform:
    description: 'Force platform type: clawhub, mcp, npm, pip (auto-detected if omitted)'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning (requires security-events: write)'
    required: false
    default: 'true'

outputs:
  grade:
    description: 'Security grade (A-F)'
    value: ${{ steps.scan.outputs.grade }}
  findings-count:
    description: 'Number of active findings'
    value: ${{ steps.scan.outputs.findings_count }}
  report-file:
    description: 'Path to the output report file'
    value: ${{ steps.scan.outputs.report_file }}
  badge:
    description: 'Markdown badge for the scan grade'
    value: ${{ steps.scan.outputs.badge }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Prism Scanner
      shell: bash
      run: pip install prism-scanner

    - name: Run Prism Scanner
      id: scan
      shell: bash
      run: |
        PLATFORM_ARG=""
        FAILON_ARG=""

        if [ -n "${{ inputs.platform }}" ]; then
          PLATFORM_ARG="--platform ${{ inputs.platform }}"
        fi

        if [ -n "${{ inputs.fail-on }}" ]; then
          FAILON_ARG="--fail-on ${{ inputs.fail-on }}"
        fi

        # First: get JSON output to extract grade
        JSON_OUT=$(prism scan ${{ inputs.path }} --format json $PLATFORM_ARG 2>/dev/null || true)
        GRADE=$(echo "$JSON_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('grade','?'))" 2>/dev/null || echo "?")
        COUNT=$(echo "$JSON_OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len([f for f in d.get('findings',[]) if not f.get('suppressed')]))" 2>/dev/null || echo "0")

        # Then: generate the requested output format
        SCAN_EXIT=0
        prism scan ${{ inputs.path }} --format ${{ inputs.format }} -o ${{ inputs.output-file }} $PLATFORM_ARG $FAILON_ARG || SCAN_EXIT=$?

        # Map grade to badge color
        case "$GRADE" in
          A) COLOR="brightgreen" ;;
          B) COLOR="green" ;;
          C) COLOR="yellow" ;;
          D) COLOR="orange" ;;
          F) COLOR="red" ;;
          *) COLOR="lightgrey" ;;
        esac

        BADGE="[![Prism Grade ${GRADE}](https://img.shields.io/badge/Prism-Grade%20${GRADE}-${COLOR}?style=flat-square)](https://github.com/aidongise-cell/prism-scanner)"

        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "findings_count=$COUNT" >> $GITHUB_OUTPUT
        echo "report_file=${{ inputs.output-file }}" >> $GITHUB_OUTPUT
        echo "badge=$BADGE" >> $GITHUB_OUTPUT

        # Print badge to job summary
        echo "### Prism Scanner Result" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "$BADGE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Grade: $GRADE** | **Findings: $COUNT**" >> $GITHUB_STEP_SUMMARY

        exit $SCAN_EXIT

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.output-file }}
        category: 'prism-scanner'
